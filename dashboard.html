<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - Controle de Banheiro</title>
    <link rel="stylesheet" href="css/style.css?v=2.1">
</head>
<body>
    <div class="container">
        <header>
            <h1>Estatísticas Diárias</h1>
            <nav>
                <a href="index.html">Início</a>
                <a href="dashboard.html">Estatísticas</a>
                <a href="calendario.html">Histórico</a>
            </nav>
        </header>

        <main>
            <div class="dashboard-grid">
                <div class="kpi-card">
                    <h3>Total de Saídas</h3>
                    <p id="totalSaidas">0</p>
                </div>
                <div class="kpi-card">
                    <h3>Alunos Distintos</h3>
                    <p id="totalAlunos">0</p>
                </div>
                <div class="kpi-card">
                    <h3>Tempo Médio</h3>
                    <p id="tempoMedio">0m</p>
                </div>
                <div class="kpi-card">
                    <h3>Tempo Total</h3>
                    <p id="tempoTotal">0m</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h2>Frequência (Vezes no dia)</h2>
                    <div id="frequenciaArea">Carregando...</div>
                </div>

                <div class="card">
                    <h2>Top Demorados (Total do Dia)</h2>
                    <div id="rankingArea">Carregando...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/ui.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
