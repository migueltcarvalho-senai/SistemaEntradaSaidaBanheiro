<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Saída - Banheiro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Barra de Navegação Superior -->
    <nav class="top-nav">
        <div class="nav-container">
            <button class="nav-btn active" onclick="window.location.href='index.html'">Controle de saida</button>
            <button class="nav-btn" onclick="window.location.href='dashboard.html'">Dashboard</button>
            <button class="nav-btn">Calendário</button>
        </div>
    </nav>

    <div class="container">
        <!-- Cabeçalho (Header Identity) -->
        <header class="header">
            <div class="header-icon">
                <!-- Espaço para logotipo / Ícone -->
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            </div>
            <h1>Controle de saida - Banheiro</h1>
            <p>Sistema de gestão educacional</p>
        </header>

        <main class="main-content">
            <!-- Painel Status do Banheiro -->
            <section class="panel status-panel">
                <div id="alunoAtivoContainer" class="ativo-container">
                    <!-- Javascript sobrescreve isso se tiver alguém fora -->
                    <div class="status-indicator available"></div>
                    <p class="empty-state status-text">Banheiro Livre no momento.</p>
                </div>
            </section>

            <!-- Painel de Entrada de Dados -->
            <section class="panel insert-panel">
                <label for="idAluno" class="input-label">Código da chamada do aluno</label>
                <div class="input-group">
                    <input type="number" id="idAluno" placeholder="Digite o número" autofocus>
                    <button id="btnRegistrar" class="btn primary">Registrar</button>
                </div>
                <div id="mensagemBox" class="message-box hidden"></div>
            </section>

            <!-- Painéis Inferiores: Fila e Registros -->
            <div class="flex-row">
                <!-- Fila de Espera -->
                <section class="panel queue-panel">
                    <div class="panel-header">
                        <h2>Fila do Banheiro</h2>
                        <span class="date-display" id="dataHoje"></span>
                    </div>
                    <ul id="listaFila" class="fila-list">
                        <!-- Itens renderizados via JS -->
                        <li class="empty-state text-center">Ninguém está na fila</li>
                    </ul>
                </section>

                <!-- Tabela de Registros -->
                <section class="panel history-panel">
                    <div class="panel-header">
                        <h2>Histórico de Hoje</h2>
                    </div>
                    <div class="table-container">
                        <table id="tabelaRegistros">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Saída</th>
                                    <th>Retorno</th>
                                    <th>Duração</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyRegistros">
                                <!-- JS popula aqui -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Setar data de hoje no painel
        document.getElementById('dataHoje').textContent = new Date().toLocaleDateString('pt-BR');
    </script>
</body>

</html>
