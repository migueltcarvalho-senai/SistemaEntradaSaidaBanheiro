<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Banheiro</title>
    <link rel="stylesheet" href="css/style.css?v=2.1">
</head>
<body>
    <div class="container">
        <header>
            <h1>Controle de Banheiro</h1>
            <nav>
                <a href="index.html">Início</a>
                <a href="dashboard.html">Estatísticas</a>
                <a href="calendario.html">Histórico</a>
            </nav>
        </header>

        <main>
            <div class="card">
                <h2>Registrar Saída/Retorno</h2>
                <form id="formRegistro" style="display: flex; gap: 10px; align-items: start;">
                    <div style="flex-grow: 1;">
                        <input type="number" id="id_aluno" placeholder="Digite o ID do Aluno" required autocomplete="off" style="width: 100%;">
                        <div id="nomeAlunoPreview" style="margin-top:8px; font-weight:bold; color:var(--azul-marinho); min-height:20px;"></div>
                    </div>
                    <button type="submit">Confirmar</button>
                </form>
                <div id="mensagem" style="margin-top:10px; font-weight:500;"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h2>No Banheiro Agora</h2>
                    <div id="ativoArea" style="font-size:1.1rem;">Carregando...</div>
                </div>

                <div class="card">
                    <h2>Fila de Espera</h2>
                    <div id="filaArea">Carregando...</div>
                </div>
            </div>

            <div class="card">
                <h2>Registros de Hoje</h2>
                <div id="hojeArea">Carregando...</div>
            </div>
        </main>
    </div>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
